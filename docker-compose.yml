version: '3.8'

services:
  backend:
    build: ./backend
    container_name: helplink-backend
    ports:
      - "8000:8000"
    environment:
      - DEMO_MODE=true
      - COPERNICUS_USER=${COPERNICUS_USER}
      - COPERNICUS_PASS=${COPERNICUS_PASS}
      - OPENCELLID_API_KEY=${OPENCELLID_API_KEY}
      - TWITTER_BEARER_TOKEN=${TWITTER_BEARER_TOKEN}
      - DATABASE_URL=sqlite+aiosqlite:///./helplink.db
    volumes:
      - ./backend/data:/app/data
      - ./backend/helplink.db:/app/helplink.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build: ./frontend
    container_name: helplink-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  data:
